name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r site/. _site/
          # ship the downloadable dataset alongside the site
          mkdir -p _site/data
          cp -r data/. _site/data/
          # data/ holds a symlink to the source guide PDF; deploy the real file
          cp "sources/دليل جموع التكسير.pdf" "_site/data/دليل جموع التكسير.pdf"
          touch _site/.nojekyll

      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v5
